name: Deploy TelcoCRM

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Inject credentials
        run: |
          echo "Before injection:"
          grep -o '__SUPABASE_URL__\|__SUPABASE_ANON__' index.html | wc -l
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|__SUPABASE_ANON__|${{ secrets.SUPABASE_ANON }}|g" index.html
          echo "After injection:"
          grep -o '__SUPABASE_URL__\|__SUPABASE_ANON__' index.html | wc -l

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
